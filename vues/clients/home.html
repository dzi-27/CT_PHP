<link rel="stylesheet" href="assets/css/feed.css">

<section id="feed-page">

  <!-- Zone de création de post -->
  <div class="post-creation">
    <textarea id="post-content" placeholder="Quoi de neuf ?"></textarea>
    <input type="file" id="post-image" accept="image/*">
    <button id="btn-create-post">Publier</button>
  </div>

  <!-- Conteneur du fil d'actualité, rempli dynamiquement par feed.js -->
  <div id="feed-container">
    <!-- les cartes de posts seront injectées ici en JS -->
  </div>

</section>
