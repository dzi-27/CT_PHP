<!--
    Page de connexion.
    Chargée dynamiquement par app.js dans <div id="app">.
    Pas de DOCTYPE, html, head ou body — c'est une vue partielle.
    Toute la logique est dans assets/js/auth.js (initLoginForm).
-->

<div class="auth-container">
    <div class="auth-card">

        <!-- En-tête -->
        <div class="auth-header">
            <h1 class="auth-title">🌐 LinkUP</h1>
            <p class="auth-subtitle">Connectez-vous à votre compte</p>
        </div>

        <!-- Message d'erreur — caché par défaut, affiché par auth.js -->
        <div id="error-message" class="alert alert-error" style="display:none;"></div>

        <!-- Message de succès — caché par défaut -->
        <div id="success-message" class="alert alert-success" style="display:none;"></div>

        <!-- Formulaire de connexion -->
        <!-- PAS d'action ni de method — auth.js gère la soumission via AJAX -->
        <form id="form-login">

            <div class="form-group">
                <label class="form-label" for="input-email">Adresse email</label>
                <input
                    type="email"
                    id="input-email"
                    class="form-input"
                    placeholder="votre@email.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="input-password">Mot de passe</label>
                <input
                    type="password"
                    id="input-password"
                    class="form-input"
                    placeholder="Votre mot de passe"
                    required
                    autocomplete="current-password"
                >
            </div>

            <!-- Lien mot de passe oublié -->
            <div class="auth-forgot">
                <a href="#/reset" class="auth-link">Mot de passe oublié ?</a>
            </div>

            <!-- Bouton de connexion -->
            <button type="submit" id="btn-login" class="btn btn-primary btn-full">
                Se connecter
            </button>

        </form>

        <!-- Lien vers l'inscription -->
        <div class="auth-footer">
            <p>Pas encore de compte ?
                <a href="#/register" class="auth-link">Créer un compte</a>
            </p>
        </div>

    </div>
</div>
