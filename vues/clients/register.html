<!--
    Page d'inscription.
    Chargée dynamiquement par app.js dans <div id="app">.
    Pas de DOCTYPE, html, head ou body — c'est une vue partielle.
    Toute la logique est dans assets/js/auth.js (initRegisterForm + initRegisterUX).

    NOTE : Le <script> inline a été supprimé de cette vue.
    Raison : les scripts injectés via innerHTML ne s'exécutent PAS dans le navigateur.
    Toutes les interactions UX (toggle password, force, correspondance) sont
    gérées dans initRegisterUX() dans auth.js, appelée par initRegisterForm().
-->

<div class="auth-container">
    <div class="auth-card">

        <!-- En-tête -->
        <div class="auth-header">
            <h1 class="auth-title">🌐 LinkUP</h1>
            <p class="auth-subtitle">Créer un nouveau compte</p>
        </div>

        <!-- Message d'erreur — caché par défaut, affiché par auth.js -->
        <div id="error-message" class="alert alert-error" style="display:none;"></div>

        <!-- Message de succès — caché par défaut -->
        <div id="success-message" class="alert alert-success" style="display:none;"></div>

        <!-- Formulaire d'inscription -->
        <!-- PAS d'action ni de method — auth.js gère la soumission via AJAX -->
        <form id="form-register">

            <!-- Prénom et Nom sur la même ligne -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="input-prenom">Prénom</label>
                    <input
                        type="text"
                        id="input-prenom"
                        class="form-input"
                        placeholder="Votre prénom"
                        required
                        autocomplete="given-name"
                        maxlength="50"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="input-nom">Nom</label>
                    <input
                        type="text"
                        id="input-nom"
                        class="form-input"
                        placeholder="Votre nom"
                        required
                        autocomplete="family-name"
                        maxlength="50"
                    >
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="input-email">Adresse email</label>
                <input
                    type="email"
                    id="input-email"
                    class="form-input"
                    placeholder="votre@email.com"
                    required
                    autocomplete="email"
                    maxlength="100"
                >
            </div>

            <!-- Mot de passe -->
            <div class="form-group">
                <label class="form-label" for="input-password">
                    Mot de passe
                    <small class="form-hint">8 caractères minimum</small>
                </label>
                <div class="input-password-wrapper">
                    <input
                        type="password"
                        id="input-password"
                        class="form-input"
                        placeholder="Choisissez un mot de passe"
                        required
                        autocomplete="new-password"
                        minlength="8"
                    >
                    <!-- Bouton pour afficher/cacher le mot de passe -->
                    <button
                        type="button"
                        class="btn-toggle-password"
                        id="toggle-password"
                        title="Afficher/Cacher le mot de passe"
                    >👁️</button>
                </div>

                <!-- Indicateur de force du mot de passe -->
                <div class="password-strength" id="password-strength" style="display:none;">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <span class="strength-label" id="strength-label"></span>
                </div>
            </div>

            <!-- Confirmation du mot de passe -->
            <div class="form-group">
                <label class="form-label" for="input-confirm-password">
                    Confirmer le mot de passe
                </label>
                <div class="input-password-wrapper">
                    <input
                        type="password"
                        id="input-confirm-password"
                        class="form-input"
                        placeholder="Répétez votre mot de passe"
                        required
                        autocomplete="new-password"
                    >
                    <button
                        type="button"
                        class="btn-toggle-password"
                        id="toggle-confirm-password"
                        title="Afficher/Cacher le mot de passe"
                    >👁️</button>
                </div>
                <!-- Indicateur de correspondance des mots de passe -->
                <small id="password-match" style="display:none;"></small>
            </div>

            <!-- Bouton d'inscription -->
            <button type="submit" id="btn-register" class="btn btn-primary btn-full">
                Créer mon compte
            </button>

        </form>

        <!-- Lien vers la connexion -->
        <div class="auth-footer">
            <p>Déjà un compte ?
                <a href="#/login" class="auth-link">Se connecter</a>
            </p>
        </div>

    </div>
</div>
