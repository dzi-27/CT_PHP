<!--
    Page de réinitialisation du mot de passe en 2 étapes.
    Chargée dynamiquement par app.js dans <div id="app">.
    
    Étape 1 (#/reset)          → saisie email → envoi du lien
    Étape 2 (#/reset?token=XX) → saisie nouveau mot de passe
    
    auth.js détecte automatiquement quelle étape afficher
    en lisant le token dans l'URL.
-->

<div class="auth-container">
    <div class="auth-card">

        <!-- En-tête -->
        <div class="auth-header">
            <h1 class="auth-title">🌐 ResoCo</h1>
        </div>

        <!-- Message d'erreur — caché par défaut -->
        <div id="error-message" class="alert alert-error" style="display:none;"></div>

        <!-- Message de succès — caché par défaut -->
        <div id="success-message" class="alert alert-success" style="display:none;"></div>

        <!-- ══════════════════════════════════════════════════
             ÉTAPE 1 — Saisie de l'email
             Visible par défaut — auth.js la cache si token présent
        ══════════════════════════════════════════════════ -->
        <div id="step-email" class="reset-step">

            <div class="auth-header">
                <h2 class="auth-subtitle">Mot de passe oublié ?</h2>
                <p class="auth-description">
                    Saisissez votre adresse email et nous vous enverrons
                    un lien pour réinitialiser votre mot de passe.
                </p>
            </div>

            <form id="form-forgot">

                <div class="form-group">
                    <label class="form-label" for="input-reset-email">
                        Adresse email
                    </label>
                    <input
                        type="email"
                        id="input-reset-email"
                        class="form-input"
                        placeholder="votre@email.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <button type="submit" id="btn-forgot" class="btn btn-primary btn-full">
                    Envoyer le lien de réinitialisation
                </button>

            </form>

            <!-- Retour au login -->
            <div class="auth-footer">
                <p>
                    <a href="#/login" class="auth-link">
                        ← Retour à la connexion
                    </a>
                </p>
            </div>

        </div>

        <!-- ══════════════════════════════════════════════════
             ÉTAPE 2 — Saisie du nouveau mot de passe
             Cachée par défaut — auth.js l'affiche si token présent
        ══════════════════════════════════════════════════ -->
        <div id="step-new-password" class="reset-step" style="display:none;">

            <div class="auth-header">
                <h2 class="auth-subtitle">Nouveau mot de passe</h2>
                <p class="auth-description">
                    Choisissez un nouveau mot de passe sécurisé
                    d'au moins 8 caractères.
                </p>
            </div>

            <form id="form-new-password">

                <!-- Nouveau mot de passe -->
                <div class="form-group">
                    <label class="form-label" for="input-new-password">
                        Nouveau mot de passe
                        <small class="form-hint">8 caractères minimum</small>
                    </label>
                    <div class="input-password-wrapper">
                        <input
                            type="password"
                            id="input-new-password"
                            class="form-input"
                            placeholder="Votre nouveau mot de passe"
                            required
                            autocomplete="new-password"
                            minlength="8"
                        >
                        <button
                            type="button"
                            class="btn-toggle-password"
                            id="toggle-new-password"
                            title="Afficher/Cacher"
                        >👁️</button>
                    </div>
                </div>

                <!-- Confirmation nouveau mot de passe -->
                <div class="form-group">
                    <label class="form-label" for="input-confirm-new-password">
                        Confirmer le mot de passe
                    </label>
                    <div class="input-password-wrapper">
                        <input
                            type="password"
                            id="input-confirm-new-password"
                            class="form-input"
                            placeholder="Répétez votre nouveau mot de passe"
                            required
                            autocomplete="new-password"
                        >
                        <button
                            type="button"
                            class="btn-toggle-password"
                            id="toggle-confirm-new-password"
                            title="Afficher/Cacher"
                        >👁️</button>
                    </div>
                    <!-- Indicateur de correspondance -->
                    <small id="new-password-match" style="display:none;"></small>
                </div>

                <button type="submit" id="btn-reset" class="btn btn-primary btn-full">
                    Réinitialiser mon mot de passe
                </button>

            </form>

            <!-- Retour au login -->
            <div class="auth-footer">
                <p>
                    <a href="#/login" class="auth-link">
                        ← Retour à la connexion
                    </a>
                </p>
            </div>

        </div>

    </div>
</div>

<!-- Script inline pour les interactions UX de cette vue uniquement -->
<script>
/**
 * Afficher / Cacher les mots de passe
 */
function togglePasswordVisibility(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn   = document.getElementById(btnId);
    if (!input || !btn) return;

    if (input.type === 'password') {
        input.type      = 'text';
        btn.textContent = '🙈';
    } else {
        input.type      = 'password';
        btn.textContent = '👁️';
    }
}

document.getElementById('toggle-new-password')?.addEventListener('click', function() {
    togglePasswordVisibility('input-new-password', 'toggle-new-password');
});

document.getElementById('toggle-confirm-new-password')?.addEventListener('click', function() {
    togglePasswordVisibility('input-confirm-new-password', 'toggle-confirm-new-password');
});

/**
 * Vérification correspondance mots de passe en temps réel
 */
document.getElementById('input-confirm-new-password')?.addEventListener('input', function() {
    const password        = document.getElementById('input-new-password').value;
    const confirmPassword = this.value;
    const matchEl         = document.getElementById('new-password-match');

    if (!matchEl) return;

    if (confirmPassword.length === 0) {
        matchEl.style.display = 'none';
        return;
    }

    matchEl.style.display = 'block';

    if (password === confirmPassword) {
        matchEl.textContent = '✅ Les mots de passe correspondent';
        matchEl.style.color = '#00cc44';
    } else {
        matchEl.textContent = '❌ Les mots de passe ne correspondent pas';
        matchEl.style.color = '#ff4444';
    }
});
</script>
