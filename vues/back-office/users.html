<!-- vues/back-office/users.html -->
<!--
    Page de gestion des utilisateurs.
    Permet de consulter, rechercher et supprimer des comptes.
    La liste est chargée dynamiquement par admin.js
    via api/admin/get-users.php.
    
    Accessible : Admin + Modérateur
    Gestion des rôles : Admin uniquement
-->

<div class="admin-layout">

    <!-- Sidebar (identique au dashboard) -->
    <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
            <span class="admin-sidebar-logo">🛡️ Admin</span>
            <div class="admin-user-info">
                <span id="admin-prenom"></span>
                <span id="admin-role" class="badge"></span>
            </div>
        </div>
        <nav class="admin-nav">
            <a href="#/admin/dashboard" class="admin-nav-link" data-route="/admin/dashboard">
                📊 Dashboard
            </a>
            <a href="#/admin/users" class="admin-nav-link active" data-route="/admin/users">
                👥 Utilisateurs
            </a>
            <a href="#/admin/posts" class="admin-nav-link" data-route="/admin/posts">
                📝 Publications
            </a>
            <a href="#/admin/moderators" class="admin-nav-link" data-route="/admin/moderators" id="menu-roles">
                🔑 Gestion des rôles
            </a>
        </nav>
        <button id="btn-admin-logout" class="btn btn-logout admin-logout">
            🚪 Déconnexion
        </button>
    </aside>

    <!-- Zone de contenu -->
    <main class="admin-content">

        <!-- En-tête -->
        <div class="admin-page-header">
            <h1 class="admin-page-title">👥 Gestion des utilisateurs</h1>
            <p class="admin-page-subtitle">
                <span id="users-count">--</span> utilisateurs inscrits
            </p>
        </div>

        <!-- Barre de recherche -->
        <div class="admin-toolbar">
            <div class="search-box">
                <input
                    type="text"
                    id="search-users"
                    class="form-input"
                    placeholder="🔍 Rechercher par nom ou email..."
                >
            </div>
        </div>

        <!-- Message de chargement -->
        <div id="users-loading" class="loading-message">
            Chargement des utilisateurs...
        </div>

        <!-- Message si aucun résultat -->
        <div id="users-empty" class="empty-message" style="display:none;">
            Aucun utilisateur trouvé.
        </div>

        <!-- Tableau des utilisateurs — rempli par admin.js -->
        <div class="admin-table-wrapper">
            <table class="admin-table" id="users-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Avatar</th>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Rôle</th>
                        <th>Inscription</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <!-- Rempli dynamiquement par admin.js -->
                <tbody id="users-tbody"></tbody>
            </table>
        </div>

    </main>

</div>
